## ox_webservice module configuration for the Manifest instance.
## Place BOTH this file and ox_cc_report_plugin.yaml in the manifest
## ox_webservice's conf/modules/active/ directory.

modules:
  - id: "ox_cc_manifest"
    name: "ox_cc_manifest_plugin"
    config_file: "/etc/ox_cc/manifest_plugin.yaml"

routes:
  - url: "^/cc/manifest(/.*)?$"
    module_id: "ox_cc_manifest"

  - url: "^/cc/clients(/.*)?$"
    module_id: "ox_cc_manifest"
