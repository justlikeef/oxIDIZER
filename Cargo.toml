[workspace]
resolver = "2"
members = [
    "crates/ox_cc_common",
    "crates/ox_cc_broker_plugin",
    "crates/ox_cc_manifest_plugin",
    "crates/ox_cc_report_plugin",
    "crates/ox_cc_admin_plugin",
    "crates/ox_cc_client",
    "crates/ox_cc_keygen",
    "crates/ox_cc_executor",
]

[workspace.dependencies]
# Crypto
ed25519-dalek    = { version = "2", features = ["zeroize"] }
x25519-dalek     = { version = "2", features = ["zeroize", "static_secrets"] }
aes-gcm          = "0.10"
chacha20poly1305 = "0.10"
hkdf             = "0.12"
sha2             = "0.10"
rand             = "0.8"
zeroize          = { version = "1", features = ["derive"] }
base64           = "0.22"

# Serialization
serde      = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"

# Identifiers and time
uuid   = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }

# Async + HTTP (client-side only)
tokio   = { version = "1", features = ["full"] }
reqwest = { version = "0.12", default-features = false, features = ["rustls-tls", "json", "blocking"] }

# CLI
clap = { version = "4", features = ["derive"] }

# Logging / tracing
tracing            = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
log                = "0.4"

# Database
rusqlite = { version = "0.31", features = ["bundled-sqlcipher"] }

# Error handling
anyhow    = "1"
thiserror = "1"
