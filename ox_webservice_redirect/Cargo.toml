[package]
name = "ox_webservice_redirect"
version = "0.1.0"
license = "GPL-3.0-only"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
ox_webservice_api = { path = "../ox_webservice_api" }
ox_workflow_abi = { path = "../crates/workflow/ox_workflow_abi" }
ox_fileproc = { path = "../crates/util/ox_fileproc" }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
regex = "1.10"
libc = "0.2"
anyhow = "1.0"
log = "0.4"
