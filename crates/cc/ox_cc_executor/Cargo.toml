[package]
name = "ox_cc_executor"
version = "0.1.0"
edition = "2021"

[dependencies]
anyhow    = "1"
serde     = { version = "1", features = ["derive"] }
serde_json = "1"
tokio     = { version = "1", features = ["full"] }
reqwest   = { version = "0.12", default-features = false, features = ["rustls-tls", "json", "blocking"] }
tracing   = "0.1"
ox_cc_common = { path = "../ox_cc_common" }
async-trait = "0.1"
hostname = "0.4"

[dev-dependencies]
tempfile    = "3"
tokio       = { version = "1", features = ["full"] }
async-trait = "0.1"
