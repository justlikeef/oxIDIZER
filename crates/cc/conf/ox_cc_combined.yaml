## Combined ox_cc module configuration — single ox_webservice instance.
##
## Loads all four ox_cc plugins on one server. Useful for development
## and small deployments. For production, use separate instances per plugin
## to enforce network-level trust boundaries.
##
## All plugins must be co-located and share:
##   - The broker DB (broker_plugin.yaml)
##   - The manifest + report DB (manifest_plugin.yaml == report_plugin.yaml db_path)
##   - The admin DB (admin_plugin.yaml)
##
## Place in conf/modules/active/.

modules:
  - id: "ox_cc_broker"
    name: "ox_cc_broker_plugin"
    config_file: "/var/repos/oxIDIZER/crates/cc/ox_cc_broker_plugin/conf/plugin.yaml"

  - id: "ox_cc_manifest"
    name: "ox_cc_manifest_plugin"
    config_file: "/var/repos/oxIDIZER/crates/cc/ox_cc_manifest_plugin/conf/plugin.yaml"

  - id: "ox_cc_report"
    name: "ox_cc_report_plugin"
    config_file: "/var/repos/oxIDIZER/crates/cc/ox_cc_report_plugin/conf/plugin.yaml"

  - id: "ox_cc_admin"
    name: "ox_cc_admin_plugin"
    config_file: "/var/repos/oxIDIZER/crates/cc/ox_cc_admin_plugin/conf/plugin.yaml"

routes:
  # Broker routes
  - url: "^/broker/healthz$"
    module_id: "ox_cc_broker"

  - url: "^/broker/request$"
    module_id: "ox_cc_broker"

  - url: "^/broker/pending(/.*)?$"
    module_id: "ox_cc_broker"

  - url: "^/broker/approved(/.*)?$"
    module_id: "ox_cc_broker"

  - url: "^/broker/enroll$"
    module_id: "ox_cc_broker"

  - url: "^/broker/clients$"
    module_id: "ox_cc_broker"

  - url: "^/broker/sessions(/.*)?$"
    module_id: "ox_cc_broker"

  - url: "^/broker/audit$"
    module_id: "ox_cc_broker"

  # Manifest instance routes
  - url: "^/cc/manifest(/.*)?$"
    module_id: "ox_cc_manifest"

  - url: "^/cc/clients(/.*)?$"
    module_id: "ox_cc_manifest"

  # Report routes
  - url: "^/cc/report(/.*)?$"
    module_id: "ox_cc_report"

  # Admin API routes
  - url: "^/admin/api(/.*)?$"
    module_id: "ox_cc_admin"
