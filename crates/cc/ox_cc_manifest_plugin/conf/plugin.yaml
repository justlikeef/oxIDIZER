# ox_cc_manifest_plugin — Command and Control Manifest Plugin

# Shared SQLite database (manifest_instance.db).
# This SAME path must be configured in report_plugin.yaml.
db_path: "/var/lib/ox_cc/manifest_instance.db"

# SQLCipher encryption key — must match report_plugin.yaml (shared file).
# Store securely (e.g. vault, systemd credential). Do not commit to SCM.
db_encryption_key: "<strong-random-passphrase>"

# Maximum allowed manifest validity window.
max_manifest_window_secs: 7776000  # 90 days
