[package]
name    = "ox_cc_client"
version = "0.1.0"
edition = "2021"
license = "GPL-3.0-only"

[[bin]]
name = "ox_cc_client"
path = "src/main.rs"

[dependencies]
ox_cc_common   = { path = "../ox_cc_common" }
ox_cc_executor = { path = "../ox_cc_executor" }

serde            = { version = "1", features = ["derive"] }
serde_json       = "1"
serde_yaml       = "0.9"
uuid             = { version = "1", features = ["v4", "serde"] }
chrono           = { version = "0.4", features = ["serde"] }
tokio            = { version = "1", features = ["full"] }
reqwest          = { version = "0.12", default-features = false, features = ["rustls-tls", "json", "blocking"] }
clap             = { version = "4", features = ["derive"] }
rusqlite         = { version = "0.31", features = ["bundled-sqlcipher"] }
tracing          = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
log              = "0.4"
anyhow           = "1"
thiserror        = "1"
base64           = "0.22"
ed25519-dalek    = { version = "2", features = ["zeroize"] }
x25519-dalek     = { version = "2", features = ["zeroize", "static_secrets"] }
trust-dns-resolver = { version = "0.23.2", features = ["dnssec-ring"] }
rcgen = "0.14.7"
url = "2.5.8"
gethostname = "1.1.0"

[dev-dependencies]
tempfile = "3"
rand     = "0.8"
