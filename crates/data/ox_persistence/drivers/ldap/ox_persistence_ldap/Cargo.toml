[package]
name = "ox_persistence_ldap"
version = "0.1.0"
license = "GPL-3.0-only"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
ox_persistence  = { path = "../../../../ox_persistence" }
ox_data_object  = { path = "../../../../ox_data_object" }
ox_data_error   = { path = "../../../../ox_data_error" }
ox_type_converter = { path = "../../../../ox_type_converter" }
ldap3           = { version = "0.11", default-features = false, features = ["tls-native"] }
tokio           = { version = "1", features = ["rt-multi-thread", "macros"] }
async-trait     = "0.1"
serde_json      = "1"
libc            = "0.2"

[features]
# Enable FFI exports (ox_driver_init, ox_driver_persist, etc.).
# Enabled by default when building the crate standalone as a cdylib.
# ox_persistence_ad links against the rlib without this feature to avoid symbol conflicts.
ffi = []
default = []
# Expose mock types (MockLdapConn, MockLdapConnFactory) for downstream integration tests.
test-support = []

[dev-dependencies]
tokio           = { version = "1", features = ["rt", "macros"] }
ox_persistence_ldap = { path = ".", features = ["test-support"] }
