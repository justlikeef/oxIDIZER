ox_type_converter = { path = "../../../../ox_type_converter" }
ox_fileproc = { path = "../../../../../util/ox_fileproc" }
mysql = "25.0.0"
myloginrs = "0.1.0"
chrono = { version = "0.4", features = ["serde"] }
libc = "0.2"
bumpalo = "3.19.0"
