version = "0.1.0"
license = "GPL-3.0-only"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
ox_persistence = { path = "../../../" }
ox_transaction = { path = "../../../../ox_transaction" }
