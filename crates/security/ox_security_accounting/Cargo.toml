[package]
name = "ox_security_accounting"
version = "0.1.0"
edition = "2021"
license = "GPL-3.0-only"

[dependencies]
ox_security_core = { path = "../ox_security_core" }
async-trait      = "0.1"
serde_json       = "1"
secrecy          = { version = "0.8", features = ["serde"] }
md-5             = "0.10"
rand             = "0.8"
futures          = "0.3"

[dev-dependencies]
tokio    = { version = "1", features = ["macros", "rt"] }
tempfile = "3"
chrono   = "0.4"
secrecy  = { version = "0.8", features = ["serde"] }
