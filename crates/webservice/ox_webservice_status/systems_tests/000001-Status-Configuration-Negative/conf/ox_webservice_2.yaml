merge: "/var/repos/oxIDIZER/conf/service/active/base.yaml"
log4rs_config: "/var/repos/oxIDIZER/conf/log4rs.yaml"
modules:
  - id: status_module
    name: ox_webservice_status
    path: "/var/repos/oxIDIZER/target/debug/libox_webservice_status.so"
servers:
  - id: "default_http"
    protocol: "http"
    port: 3060
    bind_address: "0.0.0.0"
    hosts:
      - name: "localhost"
routes:
  - url: "^/status"
    module_id: "status_module"
    phase: Content
    priority: 100
