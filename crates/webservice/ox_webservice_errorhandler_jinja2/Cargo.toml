[package]
name = "ox_webservice_errorhandler_jinja2"
version = "0.0.1"
license = "GPL-3.0-only"
edition = "2024"

[lib]
name = "ox_webservice_errorhandler_jinja2"
crate-type = ["cdylib", "rlib"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
libc = "0.2"
ox_webservice_api = { path = "../ox_webservice_api" }
ox_workflow_abi = { path = "../../workflow/ox_workflow_abi" }
ox_fileproc = { path = "../../util/ox_fileproc" }
axum = "0.7"
log = "0.4"
tera = "1.19"
anyhow = "1.0"
serde_yaml = "0.9"
regex = "1.10"
prost = "0.13"

[dev-dependencies]
cargo_metadata = "0.23.1"
libloading = "0.9.0"
tempfile = "3.23.0"
serde_json = "1.0"
ox_webservice_test_utils = { path = "../ox_webservice_test_utils" }
ox_workflow_abi = { path = "../../workflow/ox_workflow_abi" }
