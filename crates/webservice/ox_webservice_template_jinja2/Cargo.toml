[package]
name = "ox_webservice_template_jinja2"
version = "0.0.1"
license = "GPL-3.0-only"
edition = "2024"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1.0"
ox_webservice_api = { path = "../ox_webservice_api" }
ox_workflow_abi = { path = "../../workflow/ox_workflow_abi" }
ox_fileproc = { path = "../../util/ox_fileproc" }
regex = "1.10"

libc = "0.2"
reqwest = { version = "0.12", features = ["json"] }
tokio = { version = "1.36", features = ["full"] }
base64 = "0.21"
log4rs = "1.2.0"
log = "0.4"
anyhow = "1.0"
tera = "1.20.1"

[dev-dependencies]
tempfile = "3.23.0"
ox_webservice_test_utils = { path = "../ox_webservice_test_utils" }
ox_workflow_abi = { path = "../../workflow/ox_workflow_abi" }
