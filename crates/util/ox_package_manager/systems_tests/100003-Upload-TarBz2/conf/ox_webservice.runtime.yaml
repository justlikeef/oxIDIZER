log4rs_config: "/var/repos/oxIDIZER/conf/log4rs.yaml"
merge: "base.yaml"

modules:
  - id: package_manager
    name: ox_package_manager
    path: "/var/repos/oxIDIZER/target/debug/libox_package_manager.so"
    staging_directory: "/tmp/ox_test_staging_3021524"

servers:
  - id: "default_http"
    protocol: "http"
    port: 3030
    bind_address: "0.0.0.0"
    hosts:
      - name: "localhost"

routes:
  - url: "^/packages/(upload)/?"
    module_id: "package_manager"
    priority: 450
    headers:
      Method: POST
