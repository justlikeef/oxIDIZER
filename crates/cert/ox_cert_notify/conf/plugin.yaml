# ox_cert_notify — Certificate Expiry Notifications

tenant_id: "default"

store:
  driver: "sqlite"
  path: "/var/lib/ox_webservice/cert.db"

schedule: "0 0 6 * * *"
thresholds_days: [90, 60, 30, 14, 7, 1]
include_ca_certs: true

channels: []
