# ox_cert_issue — Certificate Issuance

tenant_id: "default"

store:
  driver: "sqlite"
  path: "/var/lib/ox_webservice/cert.db"

keystore:
  store_type: software
  key_dir: "/etc/pki/ox_webservice/private"
  passphrase_env: "OX_CA_KEY_PASS"

ca_intermediate_key_id: "ca-intermediate"
ca_intermediate_cert_path: "/etc/pki/ox_webservice/ca/intermediate.crt"
ca_root_cert_path: "/etc/pki/ox_webservice/ca/root.crt"

default_profile: "standard"

policy:
  domain_allowlist: []        # empty = allow all domains
  domain_blocklist: []
  max_san_count: 100
  wildcard_allowed: true
  min_rsa_bits: 2048
  require_ra_approval: false

extensions:
  aia:
    ocsp_url: "http://localhost:8080/ocsp"
    ca_issuer_url: "http://localhost:8080/ca/intermediate.crt"
  cdp:
    url: "http://localhost:8080/crl.der"
