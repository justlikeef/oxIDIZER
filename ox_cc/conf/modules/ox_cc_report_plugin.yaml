## ox_webservice module configuration for report endpoints on the Manifest instance.
## Place alongside ox_cc_manifest_plugin.yaml in conf/modules/active/.

modules:
  - id: "ox_cc_report"
    name: "ox_cc_report_plugin"
    config_file: "/etc/ox_cc/report_plugin.yaml"

routes:
  - url: "^/cc/report(/.*)?$"
    module_id: "ox_cc_report"
