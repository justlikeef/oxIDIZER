## ox_webservice module configuration for the Admin instance.
## Load BOTH this file and ox_webservice_template_jinja2.yaml in the admin
## ox_webservice's conf/modules/active/ directory.

modules:
  - id: "ox_cc_admin"
    name: "ox_cc_admin_plugin"
    config_file: "/etc/ox_cc/admin_plugin.yaml"

routes:
  - url: "^/admin/api(/.*)?$"
    module_id: "ox_cc_admin"
