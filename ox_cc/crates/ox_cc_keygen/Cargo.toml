[package]
name    = "ox_cc_keygen"
version = "0.1.0"
edition = "2021"
license = "GPL-3.0-only"

[[bin]]
name = "ox_cc_keygen"
path = "src/main.rs"

[dependencies]
ed25519-dalek = { version = "2", features = ["zeroize"] }
x25519-dalek  = { version = "2", features = ["zeroize", "static_secrets"] }
rand          = "0.8"
base64        = "0.22"
clap          = { version = "4", features = ["derive"] }
anyhow        = "1"
