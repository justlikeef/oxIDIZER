[package]
name = "ox_webservice_ping"
version = "0.1.0"
license = "GPL-3.0-only"
edition = "2021"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
ox_webservice_api = { path = "../ox_webservice_api" }
ox_workflow_abi = { path = "../crates/workflow/ox_workflow_abi" }
libc = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
log = "0.4"

[dev-dependencies]
lazy_static = "1.5.0"
ox_webservice_test_utils = { path = "../ox_webservice_test_utils" }
