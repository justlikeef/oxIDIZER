[package]
name = "ox_workflow_core"
version = "0.1.0"
edition = "2021"

[dependencies]
ox_workflow_abi = { path = "../ox_workflow_abi" }
ox_workflow_config = { path = "../ox_workflow_config" }
ox_fileproc = { path = "../../oxIDIZER/ox_fileproc" }
prost = "0.13"
prost-types = "0.13"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
serde_yaml = "0.9"
uuid = { version = "1.10", features = ["v4", "serde"] }
parking_lot = "0.12"
log = "0.4"
thiserror = "2.0"
indexmap = { version = "2.2", features = ["serde"] }

[build-dependencies]
prost-build = "0.13"
protoc-bin-vendored = "3.0"
