modules:
  - id: "security_idp"
    name: "ox_security_idp"
    phase: Content
    params:
      config_file: "${{OX_BASE}}/crates/security/ox_security_idp/conf/plugin.yaml"

routes:
  - url: "^/oauth2(/.*)?$"
    module_id: "security_idp"
    priority: 100
  - url: "^/oidc(/.*)?$"
    module_id: "security_idp"
    priority: 100
  - url: "^/saml(/.*)?$"
    module_id: "security_idp"
    priority: 100
  - url: "^/api/v1/admin/idp(/.*)?$"
    module_id: "security_idp"
    priority: 150
