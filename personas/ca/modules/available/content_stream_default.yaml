modules:
  - id: "default_theme_stream"
    name: "ox_webservice_stream"
    params:
      config_file: "/var/repos/oxIDIZER/crates/webservice/ox_webservice_stream/conf/theme.yaml"
  - id: "default_layout_stream"
    name: "ox_webservice_stream"
    params:
      config_file: "/var/repos/oxIDIZER/crates/webservice/ox_webservice_stream/conf/layout.yaml"
routes:
  - url: "^(/css/.*?)$"
    module_id: default_theme_stream
    stage: Content
    priority: 998
  - url: "^(.*)$"
    module_id: default_layout_stream
    stage: Content
    priority: 999