refresh_rate: 30 seconds

appenders:
  stdout:
    kind: console

  file:
    kind: file
    path: "logs/ox_cert.log"
    encoder:
      pattern: "{d} {l} {t} - {m}{n}"

root:
  level: info
  appenders:
    - stdout
    - file

loggers:
  ox_webservice:
    level: debug
    appenders:
      - stdout
      - file
    additive: false

  ox_cert_ca_init:
    level: debug
    appenders:
      - stdout
      - file
    additive: false

  ox_cert_issue:
    level: debug
    appenders:
      - stdout
      - file
    additive: false

  ox_cert_ocsp:
    level: info
    appenders:
      - stdout
      - file
    additive: false

  ox_cert_crl:
    level: info
    appenders:
      - stdout
      - file
    additive: false

  ox_cert_acme:
    level: debug
    appenders:
      - stdout
      - file
    additive: false

  ox_cert_notify:
    level: info
    appenders:
      - stdout
      - file
    additive: false
