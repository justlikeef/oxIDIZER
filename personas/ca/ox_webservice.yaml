# ------------------------------------------------------------------------------
# ox_cert — Certificate Authority Server Configuration
# ------------------------------------------------------------------------------
# Entry point for the certificate server.  Merges sub-directories in order:
#   service/  — workflow pipeline and logging
#   servers/  — listening sockets
#   modules/  — plugin registration and route tables

substitutions:
  OX_BASE: "/var/repos/oxIDIZER"

merge:
  - "${{OX_BASE}}/personas/ca/service/"
  - "${{OX_BASE}}/personas/ca/servers/"
  - "${{OX_BASE}}/personas/ca/modules/active/"
