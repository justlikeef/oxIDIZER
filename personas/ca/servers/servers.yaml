servers:
  # HTTP — redirect plugin sends all traffic to HTTPS (port 8443).
  # TLS certs are configured here so that browsers using HTTPS-First mode
  # (which try https:// on the same port) get a valid handshake and redirect.
  - id: "cert_http"
    protocol: "http"
    port: 8091
    bind_address: "127.0.0.1"
    hosts:
      - name: "localhost"
        tls_cert_path: "/tmp/tls_dev/chain.crt"
        tls_key_path:  "/tmp/tls_dev/localhost.p8.key"

  # HTTPS — The server certificate must be issued by a trusted CA (not this
  # ox_cert CA) to avoid a circular trust dependency on startup.
  # Place your server TLS cert/key at the paths below before starting.
  - id: "cert_https"
    protocol: "https"
    port: 8443
    bind_address: "127.0.0.1"
    hosts:
      - name: "localhost"
        tls_cert_path: "/tmp/tls_dev/chain.crt"
        tls_key_path:  "/tmp/tls_dev/localhost.p8.key"
