log4rs_config: "${{OX_BASE}}/personas/ca/log4rs.yaml"

workflow:
  name: "ox_cert"
  stages:
    - name: PreEarlyRequest
      runner: sequential
      plugins:
        - name: ox_webservice_router
      on_error: continue
    - name: EarlyRequest
      runner: sequential
      plugins:
        - name: ox_webservice_router
      on_error: continue
    - name: PostEarlyRequest
      runner: sequential
      plugins:
        - name: ox_webservice_router
      on_error: continue
    - name: PreAuthentication
      runner: sequential
      plugins:
        - name: ox_webservice_router
      on_error: continue
    - name: Authentication
      runner: sequential
      plugins:
        - name: ox_webservice_router
      on_error: continue
    - name: PostAuthentication
      runner: sequential
      plugins:
        - name: ox_webservice_router
      on_error: continue
    - name: PreAuthorization
      runner: sequential
      plugins:
        - name: ox_webservice_router
      on_error: continue
    - name: Authorization
      runner: sequential
      plugins:
        - name: ox_webservice_router
      on_error: continue
    - name: PostAuthorization
      runner: sequential
      plugins:
        - name: ox_webservice_router
      on_error: continue
    - name: PreContent
      runner: sequential
      plugins:
        - name: ox_webservice_router
      on_error: continue
    - name: Content
      runner: sequential
      plugins:
        - name: ox_webservice_router
      on_error: continue
    - name: PostContent
      runner: sequential
      plugins:
        - name: ox_webservice_router
