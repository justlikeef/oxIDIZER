    - name: PreAccounting
      runner: sequential
      plugins:
        - name: ox_webservice_router
      on_error: continue
    - name: Accounting
      runner: sequential
      plugins:
        - name: ox_webservice_router
      on_error: continue
    - name: PostAccounting
      runner: sequential
      plugins:
        - name: ox_webservice_router
      on_error: continue
    - name: PreErrorHandling
      runner: sequential
      plugins:
        - name: ox_webservice_router
      on_error: continue
    - name: ErrorHandling
      runner: sequential
      plugins:
        - name: ox_webservice_router
      on_error: continue
    - name: PostErrorHandling
      runner: sequential
      plugins:
        - name: ox_webservice_router
      on_error: continue
    - name: PreLateRequest
      runner: sequential
      plugins:
        - name: ox_webservice_router
      on_error: continue
    - name: LateRequest
      runner: sequential
      plugins:
        - name: ox_webservice_router
      on_error: continue
